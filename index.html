<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Mi vida is calling ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#243b63 0%,#111 45%,#000 100%);
color:white;
position:relative;
}

body::before{
content:"";
position:absolute;
width:170vw;
height:170vw;
background:
radial-gradient(circle,rgba(0,140,255,.12),transparent 60%);
animation:rotateBg 35s linear infinite;
}

@keyframes rotateBg{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

.particle{

position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.4;
animation:float 10s linear infinite;

}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

20%{
opacity:.5;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

.container{

position:relative;
z-index:5;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:space-evenly;
align-items:center;
padding:60px 20px;

}

.top{

text-align:center;

}

.top h1{

font-size:42px;
font-weight:700;
letter-spacing:.5px;

}

.top p{

margin-top:10px;
font-size:22px;
color:#bfbfbf;

}

.photo{

width:240px;
height:240px;
border-radius:50%;
overflow:hidden;
border:5px solid rgba(255,255,255,.2);
box-shadow:
0 0 25px rgba(255,255,255,.15),
0 0 70px rgba(0,170,255,.35);

animation:pulse 2.5s infinite;

}

.photo img{

width:100%;
height:100%;
object-fit:cover;

}

@keyframes pulse{

0%{
transform:scale(1);
box-shadow:0 0 20px rgba(255,255,255,.1);
}

50%{
transform:scale(1.05);
box-shadow:0 0 60px rgba(0,170,255,.45);
}

100%{
transform:scale(1);
box-shadow:0 0 20px rgba(255,255,255,.1);
}

}

.buttons{

position:relative;
width:100%;
height:180px;

}

.callBtn{

position:absolute;
bottom:20px;
width:90px;
height:90px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:38px;
cursor:pointer;
transition:.25s;
user-select:none;

}

#accept{

left:18%;
background:#30D158;
box-shadow:0 0 25px rgba(48,209,88,.6);

}

#decline{

right:18%;
background:#FF453A;
box-shadow:0 0 25px rgba(255,69,58,.6);

}

.label{

position:absolute;
bottom:-35px;
font-size:17px;
left:50%;
transform:translateX(-50%);
white-space:nowrap;
color:#ddd;

}

#accepted{

position:absolute;
inset:0;
background:#000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:20;

}

#accepted h2{

font-size:42px;
text-align:center;
padding:25px;
line-height:1.3;
animation:fadeUp 1s ease;

}

#accepted p{

font-size:22px;
color:#dcdcdc;
margin-top:15px;
animation:fadeUp 1.3s ease;

}

.bigHeart{

font-size:90px;
margin-top:35px;
animation:heartbeat 1s infinite;

}

@keyframes heartbeat{

0%{transform:scale(1);}
25%{transform:scale(1.2);}
50%{transform:scale(1);}
75%{transform:scale(1.15);}
100%{transform:scale(1);}

}

@keyframes fadeUp{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.heart{

position:absolute;
bottom:-40px;
font-size:28px;
animation:rise linear forwards;

}

@keyframes rise{

0%{

transform:translateY(0) scale(.6);
opacity:0;

}

15%{

opacity:1;

}

100%{

transform:translateY(-120vh) rotate(360deg) scale(1.4);
opacity:0;

}

}

</style>

</head>

<body>

<div id="accepted">

<h2>Gracias mi amor ❤️</h2>

<p>Sabía que ibas a contestar.<br>Te amo muchísimo.</p>

<div class="bigHeart">🥹❤️</div>

</div>

<div class="container">

<div class="top">

<h1>Mi vida ❤️</h1>

<p>Incoming call...</p>

</div>

<div class="photo">

<img src="https://i.pinimg.com/736x/d9/85/78/d98578911b8d277752fe50d7f458e582.jpg">

</div>

<div class="buttons">

<div id="accept" class="callBtn">

📞

<div class="label">

Aceptar

</div>

</div>

<div id="decline" class="callBtn">

📵

<div class="label">

Rechazar

</div>

</div>

</div>

</div>

<script>

for(let i=0;i<35;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=(6+Math.random()*8)+"s";

p.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(p);

}

const accept=document.getElementById("accept");

const decline=document.getElementById("decline");

const accepted=document.getElementById("accepted");

function escapeButton(){

const area=document.querySelector(".buttons");

const maxX=area.clientWidth-100;

const maxY=area.clientHeight-100;

decline.style.left=Math.random()*maxX+"px";

decline.style.top=Math.random()*maxY+"px";

decline.style.right="auto";

decline.style.bottom="auto";

}

decline.addEventListener("mouseenter",escapeButton);

decline.addEventListener("touchstart",function(e){

e.preventDefault();

escapeButton();

});

accept.addEventListener("click", () => {

    const msg = encodeURIComponent("Hola mi amor ❤️ Contesté tu llamada.");
    const url = `https://wa.me/5493513363437?text=${msg}`;
    window.location.href = url;

    document.querySelector(".container").style.display="none";
    accepted.style.display="flex";
    createHearts();
});

function createHearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

const hearts=["❤️","💖","💕","💘","💗"];

heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(22+Math.random()*30)+"px";

heart.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);

},180);

}

</script>

</body>
</html>
