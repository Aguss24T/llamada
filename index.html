<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Mi vida is calling ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

body{
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#243b63 0%,#111 45%,#000 100%);
color:white;
position:relative;
}

/* partículas */
.particle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.4;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
20%{opacity:.5;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* layout */
.container{
position:relative;
z-index:5;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:space-evenly;
align-items:center;
padding:60px 20px;
}

.top{
text-align:center;
}

.top h1{font-size:42px;}
.top p{font-size:22px;color:#bfbfbf;margin-top:10px;}

.photo{
width:240px;
height:240px;
border-radius:50%;
overflow:hidden;
border:5px solid rgba(255,255,255,.2);
box-shadow:0 0 25px rgba(255,255,255,.15),0 0 70px rgba(0,170,255,.35);
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

/* botones */
.buttons{
position:relative;
width:100%;
height:180px;
}

.callBtn{
position:absolute;
bottom:20px;
width:90px;
height:90px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:38px;
user-select:none;
cursor:pointer;
}

#accept{
left:18%;
background:#30D158;
}

#decline{
right:18%;
background:#FF453A;
}

.label{
position:absolute;
bottom:-35px;
font-size:17px;
left:50%;
transform:translateX(-50%);
color:#ddd;
white-space:nowrap;
}

/* pantalla final */
#accepted{
position:absolute;
inset:0;
background:#000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:20;
text-align:center;
}

#accepted h2{
font-size:42px;
}

#accepted p{
font-size:22px;
margin-top:15px;
color:#dcdcdc;
}

/* corazones */
.heart{
position:absolute;
bottom:-40px;
font-size:28px;
animation:rise linear forwards;
}

@keyframes rise{
0%{transform:translateY(0) scale(.6);opacity:0;}
15%{opacity:1;}
100%{transform:translateY(-120vh) rotate(360deg) scale(1.4);opacity:0;}
}

</style>

</head>

<body>

<div id="accepted">
    <h2>Gracias mi amor ❤️</h2>
    <p>Sabía que ibas a contestar.<br>Te amo muchísimo.</p>
</div>

<div class="container">

    <div class="top">
        <h1>Mi vida ❤️</h1>
        <p>Incoming call...</p>
    </div>

    <div class="photo">
        <img src="https://i.pinimg.com/736x/d9/85/78/d98578911b8d277752fe50d7f458e582.jpg">
    </div>

    <div class="buttons">

        <div id="accept" class="callBtn">📞</div>
        <div id="decline" class="callBtn">📵</div>

    </div>

</div>

<script>
if (window.__alreadyLoaded) {
    throw new Error("Script duplicado bloqueado");
}
window.__alreadyLoaded = true;

console.log("SCRIPT CARGADO UNA SOLA VEZ");
// partículas
for(let i=0;i<35;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(6+Math.random()*8)+"s";
    document.body.appendChild(p);
}

const accept=document.getElementById("accept");
const decline=document.getElementById("decline");
const accepted=document.getElementById("accepted");

let answered=false;

// botón escapar
function escapeButton(){
    const area=document.querySelector(".buttons");

    const maxX=area.clientWidth-100;
    const maxY=area.clientHeight-100;

    decline.style.left=Math.random()*maxX+"px";
    decline.style.top=Math.random()*maxY+"px";
    decline.style.right="auto";
    decline.style.bottom="auto";
}

decline.addEventListener("mouseenter",escapeButton);
decline.addEventListener("touchend",(e)=>{
    e.preventDefault();
    escapeButton();
},{passive:false});

// aceptar (BLINDADO)
function handleAccept(e){

    if(answered) return;
    answered=true;

    if(e) e.preventDefault();

    const msg = encodeURIComponent("Hola mi amor ❤️ Contesté tu llamada.");
    const url = `https://wa.me/5493513363437?text=${msg}`;

    document.querySelector(".container").style.display="none";
    accepted.style.display="flex";

    createHearts();

    setTimeout(()=>{
        window.location.href = url;
    },400);
}

accept.addEventListener("click", handleAccept);
accept.addEventListener("touchend", handleAccept,{passive:false});

// corazones
function createHearts(){
    setInterval(()=>{
        let heart=document.createElement("div");
        heart.className="heart";

        const hearts=["❤️","💖","💕","💘","💗"];
        heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

        heart.style.left=Math.random()*100+"vw";
        heart.style.fontSize=(22+Math.random()*30)+"px";
        heart.style.animationDuration=(4+Math.random()*3)+"s";

        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),7000);

    },180);
}

</script>

</body>
</html>
