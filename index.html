<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Incoming Call</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
background:#000;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:space-evenly;
align-items:center;
padding:40px 20px;
}

h1{
font-size:34px;
font-weight:600;
}

p{
font-size:20px;
color:#bfbfbf;
margin-top:-15px;
}

img{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
box-shadow:0 0 30px rgba(255,255,255,.12);
}

.buttons{
position:relative;
width:100%;
height:180px;
}

.btn{
position:absolute;
width:82px;
height:82px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
cursor:pointer;
transition:.25s;
user-select:none;
}

#accept{
left:18%;
bottom:20px;
background:#34C759;
}

#decline{
right:18%;
bottom:20px;
background:#FF3B30;
}

.label{
position:absolute;
bottom:-35px;
font-size:16px;
left:50%;
transform:translateX(-50%);
white-space:nowrap;
}

#thanks{

position:absolute;
inset:0;
background:#000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
animation:fade .8s;
}

#thanks h2{
font-size:42px;
text-align:center;
padding:20px;
}

#thanks span{
font-size:70px;
margin-top:20px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

</style>

</head>

<body>

<div class="container">

<div>
<h1>Mi vida ❤️</h1>
<p>is calling...</p>
</div>

<img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExbmRnYnJpYzVrdWJsbGFjbnp4aXRneTJuNjF1ejR6OHlnejlhcm1xeCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/JrDXuGDcVqYr9jQKTE/giphy.gif">

<div class="buttons">

<div class="btn" id="accept">
📞
<div class="label">Aceptar</div>
</div>

<div class="btn" id="decline">
📵
<div class="label">Rechazar</div>
</div>

</div>

</div>

<div id="thanks">
<h2>Gracias mi amor ❤️<br>Te amo muchísimo</h2>
<span>🥹❤️</span>
</div>

<script>

const decline=document.getElementById("decline");
const accept=document.getElementById("accept");

function moveButton(){

const area=document.querySelector(".buttons");

const maxX=area.clientWidth-90;
const maxY=area.clientHeight-90;

decline.style.left=Math.random()*maxX+"px";
decline.style.top=Math.random()*maxY+"px";
decline.style.right="auto";
decline.style.bottom="auto";

}

decline.addEventListener("mouseenter",moveButton);
decline.addEventListener("touchstart",function(e){

e.preventDefault();
moveButton();

});

accept.onclick=function(){

document.querySelector(".container").style.display="none";
document.getElementById("thanks").style.display="flex";

}

</script>

</body>
</html>
